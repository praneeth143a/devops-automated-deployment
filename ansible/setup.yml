- name: Setup EC2
  hosts: web
  become: true

  tasks:
    - name: Install packages
      apt:
        name:
          - docker.io
          - docker-compose
        state: present
        update_cache: yes

    - name: Add user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: true
